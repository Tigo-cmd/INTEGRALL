<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrall IoT Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #2d3748;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-online {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status-offline {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .device-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #4a5568;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            font-size: 0.75rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .info-value {
            font-weight: 600;
            color: #2d3748;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-danger {
            background: #fc8181;
            color: white;
        }
        
        .btn-danger:hover {
            background: #f56565;
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .btn-secondary:hover {
            background: #cbd5e0;
        }
        
        .system-stats {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            color: white;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .config-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2d3748;
            font-size: 0.9rem;
        }
        
        input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .log {
            background: #1a202c;
            color: #68d391;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.8rem;
            padding: 16px;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }
        
        .log-entry {
            margin-bottom: 4px;
        }
        
        .timestamp {
            color: #9ae6b4;
        }
        
        .error {
            color: #fc8181;
        }
        
        .warning {
            color: #fbd38d;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.75rem;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔌 Integrall Dashboard</h1>
            <p class="subtitle">IoT Device Management & Control</p>
        </header>
        
        <div class="system-stats">
            <div class="stat">
                <div class="stat-value" id="total-devices">0</div>
                <div class="stat-label">Total Devices</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="online-devices">0</div>
                <div class="stat-label">Online</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="pending-commands">0</div>
                <div class="stat-label">Pending Commands</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="uptime">0s</div>
                <div class="stat-label">Uptime</div>
            </div>
        </div>
        
        <div class="config-section">
            <h3 style="margin-bottom: 16px;">⚙️ Configuration</h3>
            <div class="form-group">
                <label>Backend URL</label>
                <input type="text" id="backend-url" value="http://localhost:8000" placeholder="http://localhost:8000">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="api-key" value="your-iot-device-api-key" placeholder="your-api-key">
            </div>
            <button class="btn btn-secondary" onclick="refreshDevices()">🔄 Refresh Devices</button>
            <button class="btn btn-primary" onclick="testConnection()">🔗 Test Connection</button>
        </div>
        
        <div class="grid" id="devices-grid">
            <!-- Devices will be loaded here -->
        </div>
        
        <div class="card" style="margin-top: 20px;">
            <div class="card-header">
                <span class="card-title">📜 System Log</span>
                <button class="btn btn-secondary" onclick="clearLog()">Clear</button>
            </div>
            <div class="log" id="system-log">
                <div class="log-entry"><span class="timestamp">[SYSTEM]</span> Dashboard initialized</div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = document.getElementById('api-key').value;
        let backendUrl = document.getElementById('backend-url').value;
        
        function log(message, type = 'info') {
            const logEl = document.getElementById('system-log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'warn' ? 'warning' : '';
            logEl.innerHTML += `<div class="log-entry ${className}"><span class="timestamp">[${timestamp}]</span> ${message}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('system-log').innerHTML = '';
        }
        
        async function apiCall(endpoint, method = 'GET', body = null) {
            backendUrl = document.getElementById('backend-url').value;
            const apiKey = document.getElementById('api-key').value;
            
            const options = {
                method,
                headers: {
                    'X-API-Key': apiKey,
                    'Content-Type': 'application/json'
                }
            };
            
            if (body) {
                options.body = JSON.stringify(body);
            }
            
            try {
                const response = await fetch(`${backendUrl}${endpoint}`, options);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return await response.json();
            } catch (error) {
                log(`API Error: ${error.message}`, 'error');
                throw error;
            }
        }
        
        async function testConnection() {
            try {
                const data = await apiCall('/health');
                log(`Connected to backend! Status: ${data.status}`, 'info');
                await refreshStats();
            } catch (error) {
                log('Failed to connect to backend', 'error');
            }
        }
        
        async function refreshStats() {
            try {
                const data = await apiCall('/api/system/status');
                document.getElementById('total-devices').textContent = data.total_devices;
                document.getElementById('online-devices').textContent = data.connected_devices;
                document.getElementById('pending-commands').textContent = data.pending_commands;
                document.getElementById('uptime').textContent = formatUptime(data.uptime_seconds);
            } catch (error) {
                log('Failed to refresh stats', 'error');
            }
        }
        
        function formatUptime(seconds) {
            if (seconds < 60) return `${seconds}s`;
            if (seconds < 3600) return `${Math.floor(seconds/60)}m`;
            return `${Math.floor(seconds/3600)}h ${Math.floor((seconds%3600)/60)}m`;
        }
        
        async function refreshDevices() {
            try {
                const data = await apiCall('/api/devices');
                renderDevices(data.devices);
                log(`Loaded ${data.devices.length} devices`);
            } catch (error) {
                log('Failed to load devices', 'error');
            }
        }
        
        function renderDevices(devices) {
            const grid = document.getElementById('devices-grid');
            
            if (devices.length === 0) {
                grid.innerHTML = `
                    <div class="card" style="text-align: center; padding: 40px;">
                        <p style="color: #718096; margin-bottom: 16px;">No devices registered yet</p>
                        <p style="font-size: 0.9rem; color: #a0aec0;">
                            Connect an ESP32 running Integrall firmware to see it here
                        </p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = devices.map(device => `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">${device.name || device.device_id}</span>
                        <span class="status-badge ${device.is_online ? 'status-online' : 'status-offline'}">
                            ${device.is_online ? 'Online' : 'Offline'}
                        </span>
                    </div>
                    
                    <div class="device-info">
                        <div class="info-item">
                            <span class="info-label">Device ID</span>
                            <span class="info-value" style="font-size: 0.8rem;">${device.device_id}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">IP Address</span>
                            <span class="info-value">${device.ip_address || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Firmware</span>
                            <span class="info-value">${device.firmware_version || 'Unknown'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Signal</span>
                            <span class="info-value">${device.rssi ? device.rssi + ' dBm' : 'N/A'}</span>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button class="btn btn-primary" onclick="sendCommand('${device.device_id}', 'relay_on')">
                            🔌 Relay ON
                        </button>
                        <button class="btn btn-danger" onclick="sendCommand('${device.device_id}', 'relay_off')">
                            ⭕ Relay OFF
                        </button>
                        <button class="btn btn-secondary" onclick="sendCommand('${device.device_id}', 'relay_toggle')">
                            🔄 Toggle
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        async function sendCommand(deviceId, commandType) {
            try {
                log(`Sending ${commandType} to ${deviceId}...`);
                const result = await apiCall('/api/commands', 'POST', {
                    device_id: deviceId,
                    command_type: commandType,
                    parameters: { pin: 5 }
                });
                log(`Command queued: ${result.command_id}`, 'info');
                setTimeout(refreshStats, 1000);
            } catch (error) {
                log(`Failed to send command: ${error.message}`, 'error');
            }
        }
        
        // Auto-refresh every 5 seconds
        setInterval(() => {
            refreshStats();
            refreshDevices();
        }, 5000);
        
        // Initial load
        testConnection();
        refreshDevices();
    </script>
</body>
</html>
