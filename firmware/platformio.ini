; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Build flags for debugging and configuration
build_flags = 
    -D INTEGRALL_DEBUG_LEVEL=3
    -D CORE_DEBUG_LEVEL=3

; Library dependencies
lib_deps = 
    bblanchon/ArduinoJson @ ^6.21.3
    ; WiFiManager for captive portal (optional but recommended)
    ; tzapu/WiFiManager @ ^2.0.16

; File system for web interface (optional)
board_build.filesystem = littlefs

; Partition scheme for OTA updates
board_build.partitions = default.csv

; Upload speed
upload_speed = 921600

; Monitor filters for colored output
monitor_filters = 
    esp32_exception_decoder
    colorize
